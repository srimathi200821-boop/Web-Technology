<!DOCTYPE html> 
<html lang="en"> 
<head> 
<meta charset="UTF-8"> 
<meta name="viewport" content="width=device-width, initial-scale=1.0"> 
<title>Student Marks System</title> 
<link rel="stylesheet" href="style.css"> 
</head> 
<body> 
 
<div class="container"> 
    <h2>Student Marks System</h2> 
    <input type="text" id="name" placeholder="Enter Name"> 
    <input type="text" id="roll" placeholder="Enter Roll Number"> 
    <input type="number" id="math" placeholder="Math Marks"> 
    <input type="number" id="science" placeholder="Science Marks"> 
    <input type="number" id="english" placeholder="English Marks"> 
    <button onclick="calculateResult()">View Result</button> 
    <button class="reset" onclick="resetForm()">Reset</button> 
    <div id="result"></div> 
</div> 
<script src="script.js"></script> 
</body> 
</html>
